# set -g default-terminal "xterm-256color"
# set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g focus-events on

set -g prefix C-b

set -g base-index 1
set -g mouse on

bind -r ^ last-window

bind -r m resize-pane -Z

set-window-option -g mode-keys vi
set-window-option -g xterm-keys on  

# TMUX_THEME="light" 
TMUX_THEME="dark" 

%if "#{==:#{TMUX_THEME},light}"
    # Rose Pine Dawn (Light)
    black="#faf4ed"
    red="#b4637a"
    green="#286983"
    yellow="#ea9d34"
    blue="#56949f"
    magenta="#907aa9"
    cyan="#d7827e"
    white="#575279"
%else
    # Rose Pine (Dark) - Your original colors
    black="#26233a"
    red="#eb6f92"
    green="#31748f"
    yellow="#f6c177"
    blue="#9ccfd8"
    magenta="#c4a7e7"
    cyan="#ebbcba"
    white="#e0def4"
%endif

# STYLE
set -g status-position bottom
set -g status-left-length 50
set -g status-style "fg=${white}, bg=${black}"
set -g status-left "#[fg=${magenta},bold]  #S #[fg=${white},nobold] | "
set -g window-status-current-format "#[fg=${blue},bold] #[underscore]#I:#W#[nounderscore] "
set -g window-status-format " #I:#W "
set -g status-right "#[fg=${cyan}] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD) "
set -g message-style "fg=${black}, bg=${yellow}"
set -g pane-border-style "fg=${black}"
set -g pane-active-border-style "fg=${blue}"

bind -T copy-mode-vi v send-keys -X begin-selection 
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

bind-key -r f run-shell "tmux neww $HOME/.local/scripts/tmux-sessionizer"
bind-key -r o run-shell "$HOME/.local/scripts/start-opencode"
bind-key -r p run-shell "$HOME/.local/scripts/start-pomo"

bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "tmux.config reloaded"
